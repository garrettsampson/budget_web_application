<!-- 
===============================================================================
base.html
===============================================================================

This file is the MASTER LAYOUT for your entire Flask application.

Every other template (dashboard.html, form.html, summary pages, etc.)
"extends" this base template.

Why do this?

Because:
- It prevents repeating navigation bars everywhere
- It keeps your page structure consistent
- It lets you control the app’s visual design from one file
- Every other page only has to fill in the { % block content % } section

Flask uses Jinja2 templating, and this file defines the page container.
===============================================================================
-->

<!DOCTYPE html>
<html>

<head>
    <!-- 
        <meta charset="UTF-8">
        -----------------------------------------
        Ensures your site can handle all normal characters
        (letters, digits, symbols, emoji, etc.)
    -->
    <meta charset="UTF-8">

    <!-- 
        <title>Budget App</title>
        -----------------------------------------
        This sets the title that appears on the browser tab.
        Each child template can override this using:
            {% block title %}My Page{% endblock %}
        If you want dynamic titles later.
    -->
    <title>Budget App</title>

    <!-- 
        Tailwind CSS (via CDN)
        -----------------------------------------
        This <script> tag loads TailwindCSS from a Content Delivery Network.
        Tailwind is a utility-first CSS framework that gives you classes like:
            bg-blue-600, text-center, mt-4, p-2, rounded-xl
        The CDN version is perfect for development and small apps.

        NOTE:
        - This line ALONE is what gives your entire site styling.
        - No installation needed.
        - The moment you remove this line, all styling disappears.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

</head>


<!-- 
<body class="bg-gray-100 text-gray-800">
-----------------------------------------
This sets global styling for every page:

bg-gray-100  = a soft gray background (easier on the eyes)
text-gray-800 = nearly-black text

These classes come from TailwindCSS.
-->
<body class="bg-gray-100 text-gray-800">


    <!-- 
    ===========================================================================
    NAVIGATION BAR
    ===========================================================================

    This <nav> bar appears at the top of EVERY page because base.html is
    extended by all other templates.

    Tailwind classes used:
        bg-white    -> white background
        shadow      -> subtle drop shadow
        mb-8        -> margin-bottom spacing (pushes page content downward)

    Inside it we have a <div> that keeps the nav centered and nicely spaced.
    ===========================================================================
    -->
    <nav class="bg-white shadow mb-8">
        <div class="max-w-5xl mx-auto px-4 py-4 flex gap-6 text-lg font-semibold">

            <!-- 
                Navigation Links:
                Each <a> tag goes to a route in app.py.
                
                hover:text-blue-500:
                    Tailwind class that changes text color when hovered
                    (interactive feedback).
                
                NOTE:
                Some links (like savings, yearly, goals) do not yet have routes,
                so clicking them will show a 404 until we build those pages.
            -->
            <a href="/" class="hover:text-blue-500">Home</a>
            <!-- INCOME DROPDOWN MENU -->
            <div x-data="{ open: false }" class="relative">
                <!-- Dropdown trigger -->
                <button 
                    @click="open = !open" 
                    @click.away="open = false"
                    class="hover:text-blue-500 flex items-center gap-1"
                >
                    Income
                    <svg class="w-4 h-4 mt-1" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19 9l-7 7-7-7" />
                    </svg>
                </button>

                <!-- Dropdown list -->
                <div 
                    x-show="open"
                    x-transition
                    class="absolute left-0 mt-2 w-48 bg-white text-gray-700 shadow-lg rounded-lg border border-gray-200"
                >
                    <a href="{{ url_for('income_form') }}" 
                    class="block px-4 py-2 hover:bg-blue-100 rounded-t-lg">
                        Add Weekly Income
                    </a>

                    <a href="{{ url_for('income_select_month') }}" 
                    class="block px-4 py-2 hover:bg-blue-100 rounded-b-lg">
                        Monthly Summary
                    </a>
                </div>
            </div>

            <a href="/savings" class="hover:text-blue-500">Savings</a>
            <a href="/yearly" class="hover:text-blue-500">Yearly</a>
            <a href="/goals" class="hover:text-blue-500">Goals</a>
        </div>
    </nav>

        <!-- ===========================================================
         TOAST FLASH MESSAGES (Bottom-Right Corner)
         Soft pastel colors — auto fade — non-intrusive
    ============================================================ -->
    <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-50">
        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
                {% for category, message in messages %}

                    <!-- Pastel Toast Box -->
                    <div class="toast px-4 py-3 rounded-lg shadow 
                                text-gray-800 border-l-4 w-80
                                {% if category == 'success' %} bg-green-100 border-green-400 {% endif %}
                                {% if category == 'error' %} bg-red-100 border-red-400 {% endif %}
                                {% if category == 'warning' %} bg-yellow-100 border-yellow-400 {% endif %}">
                        <p class="text-sm font-medium">{{ message }}</p>
                    </div>

                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- =====================================================================================
         AUTO FADE-OUT SCRIPT
         - Fades messages out after 2.5 seconds
         - Removes them from the DOM after fading
         - Keeps UI clean and modern
    ===================================================================================== -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toasts = document.querySelectorAll(".toast");

            toasts.forEach((toast) => {
                // Start fade after 2.5 seconds
                setTimeout(() => {
                    toast.style.transition = "opacity 0.8s ease";
                    toast.style.opacity = "0";

                    // Remove from DOM after fade completes
                    setTimeout(() => toast.remove(), 800);
                }, 2500);
            });
        });
    </script>




    <!-- 
    ===========================================================================
    PAGE CONTENT AREA
    ===========================================================================

    This <div> determines where CHILD TEMPLATES will insert their content.

    max-w-5xl = sets a comfortable maximum width (prevents full-screen stretching)
    mx-auto   = centers the content horizontally
    px-4      = adds left/right padding so text doesn’t touch screen edges

    The Jinja block:
        { (percent) block content (percent)}{(percent) endblock (percent)}
    tells Flask:
        "Any child template that 'extends base.html' will place its custom HTML here."

    Example:
        dashboard.html → puts its <h1> and <p> inside this container.
        income/form.html → puts the form here.
        income/month_view.html → puts the summary table here.

    This structure creates a consistent professional layout.
    ===========================================================================
    -->
    <div class="max-w-5xl mx-auto px-4">
        {% block content %}
        {% endblock %}
    </div>


</body>
</html>

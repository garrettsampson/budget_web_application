<!-- 
===============================================================================
base.html
===============================================================================

This file is the MASTER LAYOUT for your entire Flask application.

Every other template (dashboard.html, form.html, summary pages, etc.)
"extends" this base template.

Why do this?

Because:
- It prevents repeating navigation bars everywhere
- It keeps your page structure consistent
- It lets you control the app’s visual design from one file
- Every other page only has to fill in the { % block content % } section

Flask uses Jinja2 templating, and this file defines the page container.
===============================================================================
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- 
        <meta charset="UTF-8">
        -----------------------------------------
        Ensures your site can handle all normal characters
        (letters, digits, symbols, emoji, etc.)
    -->
    <meta charset="UTF-8">

    <!-- 
        <title>Budget App</title>
        -----------------------------------------
        This sets the title that appears on the browser tab.
        Each child template can override this using:
            {% block title %}My Page{% endblock %}
        If you want dynamic titles later.
    -->
    <title>Budget App</title>

    <!-- 
        Tailwind CSS (via CDN)
        -----------------------------------------
        This <script> tag loads TailwindCSS from a Content Delivery Network.
        Tailwind is a utility-first CSS framework that gives you classes like:
            bg-blue-600, text-center, mt-4, p-2, rounded-xl
        The CDN version is perfect for development and small apps.

        NOTE:
        - This line ALONE is what gives your entire site styling.
        - No installation needed.
        - The moment you remove this line, all styling disappears.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for dropdown menus (like Income dropdown) -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <!-- 
        THEME VARIABLES
        We use CSS custom properties (variables) so that changing a theme
        updates ALL UI colors consistently.
    -->
    <style>
        :root {
            /* Layered Layout Colors */
            --color-bg: #f1f5f9;          /* Page Background */
            --color-navbar-bg: #ffffff;   /* Navbar Background */
            --color-card-bg: #ffffff;     /* Card Background (panels, tables, forms) */
            --color-border: #e5e7eb;      /* Default border color */
            --color-input-bg: #ffffff;    /* Input field background */

            /* Text */
            --color-text: #0f172a;        /* Default text color (dark slate) */
            --color-text-secondary: #4b5563; /* Softer secondary text (descriptions, helper text) */

            /* Primary / accent */
            --color-primary: #3b82f6;     /* Main accent (buttons, links) */
            --color-primary-hover: #2563eb; /* Hover state */
            --color-accent: #93c5fd;      /* Soft accent / highlight */

            /* Status Colors (used in toasts, future charts, etc.) */
            --color-success: #22c55e;     /*Success Color (green) */
            --color-error: #ef4444;       /* Error Color (red) */
            --color-warning: #f59e0b;     /* Warning Color (yellow) */
        }

        /*
        Reusable utility classes so we dont repeat inline styles everywhere.
        These sit on top of Tailwind, only for colors.
        */

        /* Page and card styling */
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
        }

        .app-card {
            background-color: var(--color-card-bg);
            color: var(--color-text);   /* FIXED: uses theme text color */
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;    /* Better spacing */
            font-weight: 500;       /* Medium weight for readability */
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        /* Primary button (solid) */
        .btn-primary {
            background-color: var(--color-primary);
            color: #ffffff;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }
        .btn-primary:hover {
            background-color: var(--color-primary-hover);
            transform: translateY(-1px);
        }

        /* Secondary button (outline) */
        .btn-secondary {
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            background-color: transparent;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(148, 163, 184, 0.1); /* soft gray/blue tint */
            transform: translateY(-1px);
        }

        /* Page title utility */
        .page-title {
            color: var(--color-text);
        }

        /* Secondary text utility (for helper paragraphs, hints, etc) */
        .text-secondary {
            color: var(--color-text-secondary);
        }


        /* Navbar link styling */
        .nav-link {
            color: var(--color-text);
        }
        .nav-link:hover {
            color: var(--color-primary);
        }

        /* Toast base style - colors per category are set via inline style in JS or vars */
        .toast {
            border-left-width: 4px;
        }
    </style>
</head>


<!-- 
<body class="bg-gray-100 text-gray-800">
-----------------------------------------
This sets global styling for every page:

bg-gray-100  = a soft gray background (easier on the eyes)
text-gray-800 = nearly-black text

These classes come from TailwindCSS.
-->
<body class="text-gray-800">

    <!-- NAVBAR -->
    <nav class="shadow mb-8" style="background-color: var(--color-navbar-bg);">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between text-lg font-semibold">

            <!-- LEFT: Navigation links -->
            <div class="flex gap-6 items-center">
                <a href="{{ url_for('home') }}" class="nav-link">Home</a>
                

                <!-- INCOME DROPDOWN -->
                <div x-data="{ open: false }" class="relative">
                    <button 
                        @click="open = !open" 
                        @click.away="open = false"
                        class="nav-link flex items-center gap-1"
                    >
                        Income
                        <svg class="w-4 h-4 mt-1" fill="none" stroke="currentColor" 
                             stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    <!-- DROPDOWN CONTENT -->
                    <div 
                        x-show="open"
                        x-transition
                        class="absolute left-0 mt-2 w-56 bg-white text-gray-700 shadow-lg 
                               rounded-lg border border-gray-200 z-40"
                        style="background-color: var(--color-card-bg); border-color: var(--color-border);"
                    >
                        <a href="{{ url_for('income_form') }}" 
                           class="block px-4 py-2 hover:bg-blue-50 rounded-t-lg"
                           style="color: var(--color-text-secondary);">
                            Add Weekly Income
                        </a>

                        <a href="{{ url_for('income_select_month') }}" 
                           class="block px-4 py-2 hover:bg-blue-50 rounded-b-lg"
                           style="color: var(--color-text-secondary);">
                            Monthly Summary
                        </a>
                    </div>
                </div>

                <!-- NEW: EXPENSES TAB -->
                <a href="{{ url_for('expenses_view_redirect') }}" class="nav-link">Expenses</a>


                
                <a href="/savings" class="nav-link">Savings</a>
                <a href="/yearly" class="nav-link">Yearly</a>
                <a href="/goals" class="nav-link">Goals</a>
            </div>

            <!-- RIGHT: Settings (gear icon) -->
            <div>
                <a href="{{ url_for('settings') }}" class="nav-link" title="Settings">
                    <!-- Simple gear icon using SVG -->
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M11.25 4.5l1.5 0 0.75-1.5 1.5 0.75 1.06-1.06 1.06 1.06 0.75-1.5 1.5 0.75 0.75 1.5 1.5 0.75-0.75 1.5 1.06 1.06-1.06 1.06 0.75 1.5-1.5 0.75-0.75 1.5-1.5-0.75-1.06 1.06-1.06-1.06-1.5 0.75-0.75-1.5-1.5-0.75 0.75-1.5-1.06-1.06 1.06-1.06-0.75-1.5 1.5-0.75z" />
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- TOAST FLASH MESSAGES (Bottom-right, pastel style) -->
    <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-50">
        {% with messages = get_flashed_messages(with_categories=True) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div 
                        class="toast px-4 py-3 rounded-lg shadow text-gray-800 w-80"
                        style="background-color: var(--color-card-bg);"
                            
                            data-border-color=" 
                                {% if category == 'success' %} var(--color-success)
                                {% elif category == 'error' %} var(--color-error)
                                {% elif category == 'warning' %} var(--color-warning)
                                {% else %} var(--color-accent) {% endif %}
                        "
                    >
                        <p class="text-sm font-medium">{{ message }}</p>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    <!-- APPLY BORDER COLOR TO TOASTS (Fixes VS Code warnings) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".toast").forEach(el => {
                const border = el.getAttribute("data-border-color");
                if (border) {
                    el.style.borderColor = border;
                }
            });
        });
    </script>


    <!-- MAIN CONTENT WRAPPER -->
    <div class="max-w-5xl mx-auto px-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- AUTO FADE-OUT FOR TOASTS -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toasts = document.querySelectorAll(".toast");
            toasts.forEach((toast) => {
                setTimeout(() => {
                    toast.style.transition = "opacity 0.8s ease";
                    toast.style.opacity = "0";
                    setTimeout(() => toast.remove(), 800);
                }, 2500);
            });
        });
    </script>

    <!-- THEME ENGINE -->
    <script>
        // All available themes (Option C layering)
        const THEMES = {
            "pastel-blue": {
                bg: "#f1f5f9",
                navbarBg: "#ffffff",
                cardBg: "#ffffff",
                border: "#e5e7eb",
                inputBg: "#ffffff",
                text: "#0f172a",
                textSecondary: "#4b5563",   // NEW
                primary: "#3b82f6",
                primaryHover: "#2563eb",
                accent: "#93c5fd",
                success: "#22c55e",
                error: "#ef4444",
                warning: "#f97316",
            },
            "pastel-green": {
                bg: "#ecfdf3",
                navbarBg: "#ffffff",
                cardBg: "#ffffff",
                border: "#bbf7d0",
                inputBg: "#ffffff",
                text: "#064e3b",
                textSecondary: "#047857",   // a bit softer than main text
                primary: "#22c55e",
                primaryHover: "#16a34a",
                accent: "#bbf7d0",
                success: "#22c55e",
                error: "#f97373",
                warning: "#facc15",
            },
            "pastel-purple": {
                bg: "#f5f3ff",
                navbarBg: "#ffffff",
                cardBg: "#ffffff",
                border: "#ddd6fe",
                inputBg: "#ffffff",
                text: "#4c1d95",
                textSecondary: "#6d28d9",   // a bit softer than main text
                primary: "#a78bfa",
                primaryHover: "#8b5cf6",
                accent: "#ddd6fe",
                success: "#22c55e",
                error: "#f97373",
                warning: "#facc15",
            },
            "warm-sunset": {
                bg: "#fff7ed",
                navbarBg: "#ffffff",
                cardBg: "#ffffff",
                border: "#fed7aa",
                inputBg: "#ffffff",
                text: "#7c2d12",
                textSecondary: "#9a3412",   // a bit softer than main text
                primary: "#fb923c",
                primaryHover: "#f97316",
                accent: "#fed7aa",
                success: "#22c55e",
                error: "#f97373",
                warning: "#f97316",
            },
            "rose-pink": {
                bg: "#fff1f2",
                navbarBg: "#ffffff",
                cardBg: "#ffffff",
                border: "#fbcfe8",
                inputBg: "#ffffff",
                text: "#9d174d",
                textSecondary: "#be185d",   // a bit softer than main text
                primary: "#ec4899",
                primaryHover: "#db2777",
                accent: "#fbcfe8",
                success: "#22c55e",
                error: "#fb7185",
                warning: "#facc15",
            },
            "dark-mode": {
                bg: "#0f172a",
                navbarBg: "#020617",
                cardBg: "#111827",
                border: "#1f2937",
                inputBg: "#020617",
                text: "#e5e7eb",
                textSecondary: "#9ca3af",   // a bit softer than main text
                primary: "#3b82f6",
                primaryHover: "#60a5fa",
                accent: "#1d4ed8",
                success: "#22c55e",
                error: "#f97373",
                warning: "#facc15",
            },
            "terminal-green": {
                bg: "#000000",
                navbarBg: "#000000",
                cardBg: "#050505",
                border: "#22c55e",
                inputBg: "#000000",
                text: "#22c55e",
                textSecondary: "#4ade80",   // a bit softer than main text
                primary: "#22c55e",
                primaryHover: "#4ade80",
                accent: "#16a34a",
                success: "#22c55e",
                error: "#f97373",
                warning: "#facc15",
            },
        };

        function applyThemeVars(theme) {
            const root = document.documentElement;
            root.style.setProperty("--color-bg", theme.bg);
            root.style.setProperty("--color-navbar-bg", theme.navbarBg);
            root.style.setProperty("--color-card-bg", theme.cardBg);
            root.style.setProperty("--color-border", theme.border);
            root.style.setProperty("--color-input-bg", theme.inputBg);
            root.style.setProperty("--color-text", theme.text);
            // the theme.text makes sure old themes 
            // dont break if they dont define textSecondary (below)
            root.style.setProperty("--color-text-secondary", theme.textSecondary || theme.text); 
            root.style.setProperty("--color-primary", theme.primary);
            root.style.setProperty("--color-primary-hover", theme.primaryHover);
            root.style.setProperty("--color-accent", theme.accent);
            root.style.setProperty("--color-success", theme.success);
            root.style.setProperty("--color-error", theme.error);
            root.style.setProperty("--color-warning", theme.warning);
        }

        function loadThemeFromStorage() {
            const storedName = localStorage.getItem("themeName") || "pastel-blue";
            const storedCustom = localStorage.getItem("customTheme");

            if (storedName === "custom" && storedCustom) {
                try {
                    const custom = JSON.parse(storedCustom);
                    applyThemeVars(custom);
                    return;
                } catch (e) {
                    console.warn("Failed to parse custom theme, falling back to default.");
                }
            }

            const theme = THEMES[storedName] || THEMES["pastel-blue"];
            applyThemeVars(theme);
        }

        // Expose helpers globally so settings.html can call them
        window.setTheme = function (name) {
            if (name === "custom") {
                // custom theme will be applied separately from settings page
                localStorage.setItem("themeName", "custom");
                return;
            }
            const theme = THEMES[name];
            if (!theme) return;
            localStorage.setItem("themeName", name);
            localStorage.removeItem("customTheme");
            applyThemeVars(theme);
        };

        window.setCustomTheme = function (customThemeObj) {
            localStorage.setItem("themeName", "custom");
            localStorage.setItem("customTheme", JSON.stringify(customThemeObj));
            applyThemeVars(customThemeObj);
        };

            // -------------------------------------------------------------
            // Helper: get the currently active theme colors (object)
            // -------------------------------------------------------------
            // Used by the settings page to sync the color pickers.
            window.getActiveThemeColors = function () {
                const storedName = localStorage.getItem("themeName") || "pastel-blue";
                const storedCustom = localStorage.getItem("customTheme");

                if (storedName === "custom" && storedCustom) {
                    try {
                        return JSON.parse(storedCustom);
                    } catch (e) {
                        console.warn("Failed to parse customTheme JSON, falling back to default.");
                    }
                }

                // Fallback to one of the built-in preset themes
                return THEMES[storedName] || THEMES["pastel-blue"];
            };

            // -------------------------------------------------------------
            // Helper: read all user-saved custom themes from localStorage
            // -------------------------------------------------------------
            // Stored as: { "My Theme Name": { ...colors... }, ... }
            window.getSavedThemes = function () {
                const raw = localStorage.getItem("savedThemes");
                if (!raw) return {};
                try {
                    return JSON.parse(raw);
                } catch (e) {
                    console.warn("Failed to parse savedThemes JSON, starting fresh.");
                    return {};
                }
            };

            // Save / overwrite a named custom theme
            window.saveThemeByName = function (name, themeObj) {
                const themes = window.getSavedThemes();
                themes[name] = themeObj;
                localStorage.setItem("savedThemes", JSON.stringify(themes));
            };

            // Delete a named custom theme
            window.deleteThemeByName = function (name) {
                const themes = window.getSavedThemes();
                delete themes[name];
                localStorage.setItem("savedThemes", JSON.stringify(themes));
            };


        document.addEventListener("DOMContentLoaded", () => {
            loadThemeFromStorage();
        });
    </script>

</body>
</html>
